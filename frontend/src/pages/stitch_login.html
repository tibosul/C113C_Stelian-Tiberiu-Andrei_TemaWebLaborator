<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kinetic Lens | Precision Access</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;family=Inter:wght@300..600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "error": "#ffb4ab",
                    "on-surface": "#dce1fb",
                    "on-tertiary-container": "#a22d44",
                    "surface": "#0c1324",
                    "error-container": "#93000a",
                    "primary-fixed-dim": "#00daf3",
                    "background": "#0c1324",
                    "on-secondary-fixed": "#002114",
                    "on-primary-fixed-variant": "#004f58",
                    "outline": "#849396",
                    "on-error-container": "#ffdad6",
                    "primary": "#c3f5ff",
                    "on-surface-variant": "#bac9cc",
                    "primary-fixed": "#9cf0ff",
                    "on-error": "#690005",
                    "on-tertiary": "#67001f",
                    "primary-container": "#00e5ff",
                    "inverse-surface": "#dce1fb",
                    "secondary-fixed": "#68fcbf",
                    "surface-container-high": "#23293c",
                    "surface-container-highest": "#2e3447",
                    "tertiary-container": "#ffc1c6",
                    "tertiary-fixed": "#ffdadc",
                    "on-tertiary-fixed": "#400010",
                    "inverse-primary": "#006875",
                    "surface-tint": "#00daf3",
                    "tertiary-fixed-dim": "#ffb2b9",
                    "secondary": "#45dfa4",
                    "on-primary-fixed": "#001f24",
                    "on-secondary": "#003825",
                    "on-secondary-fixed-variant": "#005137",
                    "on-secondary-container": "#00452e",
                    "surface-variant": "#2e3447",
                    "surface-bright": "#33394c",
                    "outline-variant": "#3b494c",
                    "on-tertiary-fixed-variant": "#891933",
                    "surface-container": "#191f31",
                    "on-background": "#dce1fb",
                    "on-primary": "#00363d",
                    "surface-dim": "#0c1324",
                    "surface-container-lowest": "#070d1f",
                    "surface-container-low": "#151b2d",
                    "on-primary-container": "#00626e",
                    "inverse-on-surface": "#2a3043",
                    "tertiary": "#ffe8e8",
                    "secondary-container": "#00bd85",
                    "secondary-fixed-dim": "#45dfa4"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0c1324;
        }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(12, 19, 36, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 73, 76, 0.15);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }
    </style>
</head>
<body class="bg-surface-dim text-on-surface flex flex-col min-h-screen overflow-hidden relative">
<!-- Background Ambient Glows -->
<div class="absolute top-[-10%] right-[-5%] w-[40rem] h-[40rem] bg-primary-container/10 blur-[120px] rounded-full pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[35rem] h-[35rem] bg-secondary-container/5 blur-[100px] rounded-full pointer-events-none"></div>
<!-- Main Content Shell -->
<main class="relative z-10 flex-grow flex items-center justify-center p-6">
<div class="w-full max-w-xl">
<!-- Brand Header -->
<div class="flex flex-col items-center mb-10 text-center">
<h1 class="font-headline font-black text-2xl tracking-tighter text-slate-50 uppercase mb-2">Kinetic Lens</h1>
<p class="font-label text-xs tracking-[0.2em] text-cyan-400 uppercase">Institutional Grade Infrastructure</p>
</div>
<!-- Glassmorphism Card -->
<div class="glass-panel p-8 md:p-12 rounded-xl shadow-2xl shadow-slate-950/50">
<header class="mb-8">
<h2 class="font-headline text-2xl font-extrabold text-slate-50 tracking-tight mb-2 text-center md:text-left">Secure Access</h2>
<p class="text-sm text-on-surface-variant leading-relaxed text-center md:text-left">Precision execution for institutional grade trading.</p>
</header>
<!-- Form Section -->
<form class="space-y-6">
<div class="space-y-2">
<label class="block font-label text-[11px] uppercase tracking-[0.1em] text-on-surface-variant font-medium ml-1" for="email">Email Address or Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-xl group-focus-within:text-cyan-400 transition-colors">mail</span>
<input class="w-full bg-surface-container-highest/40 border-none rounded-lg py-4 pl-12 pr-4 text-on-surface focus:ring-1 focus:ring-cyan-400/50 transition-all font-body text-sm placeholder:text-slate-600" id="email" name="email" placeholder="Email Address or Username" type="text"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center mb-1 px-1">
<label class="block font-label text-[11px] uppercase tracking-[0.1em] text-on-surface-variant font-medium" for="password">Access Key</label>
<a class="text-[10px] uppercase tracking-widest text-cyan-400 hover:text-cyan-300 transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-xl group-focus-within:text-cyan-400 transition-colors">lock</span>
<input class="w-full bg-surface-container-highest/40 border-none rounded-lg py-4 pl-12 pr-4 text-on-surface focus:ring-1 focus:ring-cyan-400/50 transition-all font-body text-sm placeholder:text-slate-600" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full py-4 rounded-lg bg-gradient-to-br from-primary-container to-surface-tint text-on-primary-fixed font-label text-[11px] uppercase tracking-[0.2em] font-black hover:brightness-110 neon-glow transition-all active:scale-[0.98] duration-200 flex items-center justify-center gap-2" type="submit">
                            Sign In
                            <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</form>
<!-- Alternative Action -->
<div class="mt-8 pt-8 border-t border-outline-variant/10 text-center">
<p class="font-body text-sm text-on-surface-variant">
                        New to the terminal? 
                        <a class="text-cyan-400 font-medium hover:underline decoration-cyan-400/30 underline-offset-4 ml-1" href="#">Create Account</a>
</p>
</div>
</div>
<!-- Footer Links -->
<footer class="mt-8 flex justify-center gap-8 text-[10px] font-label uppercase tracking-widest text-slate-600">
<a class="hover:text-cyan-400 transition-colors" href="#">Privacy Protocol</a>
<a class="hover:text-cyan-400 transition-colors" href="#">Encrypted Support</a>
<a class="hover:text-cyan-400 transition-colors" href="#">Terms of Access</a>
</footer>
</div>
</main>
<!-- Side Graphic Decor -->
<div class="hidden lg:block absolute left-12 top-1/2 -translate-y-1/2 rotate-90 origin-left">
<div class="flex items-center gap-4">
<div class="h-[1px] w-32 bg-gradient-to-r from-transparent via-slate-800 to-transparent"></div>
<span class="text-[9px] uppercase tracking-[0.5em] text-slate-700 font-headline font-bold">Encrypted End-To-End</span>
<div class="h-[1px] w-32 bg-gradient-to-r from-transparent via-slate-800 to-transparent"></div>
</div>
</div>
<!-- Legal Footer -->
<footer class="relative z-10 w-full py-6 px-8 flex justify-center items-center">
<p class="font-label text-[10px] uppercase tracking-[0.2em] text-slate-600">
            © 2024 Kinetic Lens Trading. Precision execution.
        </p>
</footer>
</body></html>
